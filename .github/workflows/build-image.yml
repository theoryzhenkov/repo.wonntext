name: Build and push wonntext runtime image

on:
  push:
    branches: [main]
    paths:
      - sky/Dockerfile.wonntext
      - sky/requirements-runtime.txt
      - .github/workflows/build-image.yml
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to push (default: latest)"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache
          docker system prune -af || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./sky/Dockerfile.wonntext
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}/wonntext-runtime:${{ github.event.inputs.tag || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
