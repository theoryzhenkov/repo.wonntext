# Minimal SkyPilot smoke test on RunPod.
# This does not train; it just verifies that SkyPilot can provision a pod,
# run the bootstrap, and see the GPU.

name: wonntext-smoke

resources:
  cloud: runpod
  accelerators: L4:1
  disk_size: 100

workdir: .

setup: |
  echo "Smoke-test setup running"
  python --version
  which python
  nvidia-smi || true

run: |
  echo "Smoke-test run reached"
  python -c "import sys; print('Python path:', sys.executable)"
