# Ablation: WONNText with a separate random omega embedding.
# Uses ch=128 so the total parameter count is close to the default ch=256
# WONNText (which shares the token embedding as omega).

name: wonntext-omega

resources:
  cloud: runpod
  image_id: docker:theoryzhenkov/wonntext-runtime:latest
  accelerators: L4:1
  disk_size: 100

# Provide the Docker Hub password at launch time:
#   --env SKYPILOT_DOCKER_PASSWORD="$DOCKERHUB_TOKEN"
envs:
  SKYPILOT_DOCKER_SERVER: docker.io
  SKYPILOT_DOCKER_USERNAME: theoryzhenkov

workdir: .

setup: |
  set -e
  cd "$SKYP_TASK_WORKDIR"

  # torch is already present in the pre-baked image.
  pip install --no-cache-dir -r sky/requirements-runtime.txt

  # Prepare WikiText-2 BPE dataset.
  python scripts/prepare_wikitext.py \
      --out_dir "$HOME/wikitext_data" \
      --vocab_size 10000

run: |
  set -e
  cd "$SKYP_TASK_WORKDIR"
  PYTHONPATH=src python -m wonntext.train \
      --model wonn \
      --omega_as_token_embed false \
      --data_dir "$HOME/wikitext_data" \
      --seq_len 256 \
      --batchsize 32 \
      --eval_batchsize 32 \
      --ch 128 \
      --heads 8 \
      --T 16 \
      --L 1 \
      --epochs 50 \
      --lr 1e-3 \
      --clip_grad_norm 1.0 \
      --eval_freq 1 \
      --device auto \
      --exp_name wonntext_omega
