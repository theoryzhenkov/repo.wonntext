# Fine-tune the 10x WONNText WikiText-103 checkpoint on the two-stage arithmetic curriculum.
# Requires assets/weights/wonntext_wikitext_10x.bin (produced by the WikiText pre-training run).
# Uses the default SkyPilot image. T=8 + gradient checkpointing for speed.

name: arithmetic-curriculum-wonn-10x

resources:
  cloud: runpod
  accelerators: A40:1
  disk_size: 100

workdir: .

setup: |
  set -e
  cd "$SKYP_TASK_WORKDIR"

  pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cu124
  pip install --no-cache-dir -r sky/requirements-runtime.txt

  # Generate both curriculum stages on the node.
  python scripts/prepare_arithmetic_curriculum.py \
      --out_dir data/arithmetic_curriculum \
      --tokenizer_path assets/wikitext/tokenizer.json

run: |
  set -e
  cd "$SKYP_TASK_WORKDIR"

  # Stage 1: two-digit addition.
  PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True PYTHONPATH=src python -m wonntext.train_arithmetic \
      --data_dir data/arithmetic_curriculum/stage1 \
      --checkpoint assets/weights/wonntext_wikitext_10x.bin \
      --model wonn \
      --ch 1024 \
      --heads 16 \
      --L 4 \
      --T 8 \
      --rope true \
      --omega_as_token_embed true \
      --epochs 50 \
      --batchsize 64 \
      --eval_batchsize 128 \
      --lr 1e-4 \
      --optimizer adamw \
      --weight_decay 0.01 \
      --warmup_steps 100 \
      --lr_min 1e-5 \
      --amp true \
      --grad_checkpoint true \
      --clip_grad_norm 1.0 \
      --eval_freq 10 \
      --device auto \
      --save_dir runs/arithmetic_curriculum_10x \
      --exp_name stage1_wonntext_10x

  # Stage 2: three-number expressions with +, -, *, /.
  PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True PYTHONPATH=src python -m wonntext.train_arithmetic \
      --data_dir data/arithmetic_curriculum/stage2 \
      --checkpoint runs/arithmetic_curriculum_10x/stage1_wonntext_10x/final.pt \
      --model wonn \
      --ch 1024 \
      --heads 16 \
      --L 4 \
      --T 8 \
      --rope true \
      --omega_as_token_embed true \
      --epochs 100 \
      --batchsize 64 \
      --eval_batchsize 128 \
      --lr 1e-4 \
      --optimizer adamw \
      --weight_decay 0.01 \
      --warmup_steps 100 \
      --lr_min 1e-5 \
      --amp true \
      --grad_checkpoint true \
      --clip_grad_norm 1.0 \
      --eval_freq 10 \
      --device auto \
      --save_dir runs/arithmetic_curriculum_10x \
      --exp_name stage2_wonntext_10x
