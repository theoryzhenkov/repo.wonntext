# Train the 10x Transformer baseline on WikiText-103 using an A40.
# Uses the default SkyPilot image (torch is installed in setup).
# Optimisations: pre-norm, bf16 AMP, AdamW + cosine LR.

name: transformer-wikitext-10x

resources:
  cloud: runpod
  accelerators: A40:1
  disk_size: 100

workdir: .

setup: |
  set -e
  cd "$SKYP_TASK_WORKDIR"

  pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cu124
  pip install --no-cache-dir -r sky/requirements-runtime.txt

  # Prepare WikiText-103 BPE dataset (~100M tokens).
  # Reuse the WikiText-2 tokenizer so the arithmetic fine-tuning vocab matches.
  python scripts/prepare_wikitext.py \
      --out_dir "$HOME/wikitext_data" \
      --vocab_size 10000 \
      --config wikitext-103-raw-v1 \
      --tokenizer_path assets/wikitext/tokenizer.json

run: |
  set -e
  cd "$SKYP_TASK_WORKDIR"
  PYTHONPATH=src python -m wonntext.train \
      --data_dir "$HOME/wikitext_data" \
      --seq_len 256 \
      --batchsize 64 \
      --eval_batchsize 128 \
      --model transformer \
      --d_model 768 \
      --nhead 8 \
      --num_layers 4 \
      --d_ff 2048 \
      --epochs 10 \
      --lr 1e-4 \
      --optimizer adamw \
      --weight_decay 0.01 \
      --warmup_steps 1000 \
      --lr_min 1e-5 \
      --amp true \
      --clip_grad_norm 1.0 \
      --eval_freq 1 \
      --device auto \
      --exp_name transformer_wikitext_10x
