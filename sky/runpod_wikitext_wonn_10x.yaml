# Train the 10x WONNText model on WikiText-2 using an A40.
# Uses the default SkyPilot image (torch is installed in setup).

name: wonntext-wikitext-10x

resources:
  cloud: runpod
  accelerators: A40:1
  disk_size: 100

workdir: .

setup: |
  set -e
  cd "$SKYP_TASK_WORKDIR"

  pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cu124
  pip install --no-cache-dir -r sky/requirements-runtime.txt

  # Prepare WikiText-2 BPE dataset.
  python scripts/prepare_wikitext.py \
      --out_dir "$HOME/wikitext_data" \
      --vocab_size 10000

run: |
  set -e
  cd "$SKYP_TASK_WORKDIR"
  PYTHONPATH=src python -m wonntext.train \
      --data_dir "$HOME/wikitext_data" \
      --seq_len 256 \
      --batchsize 64 \
      --eval_batchsize 128 \
      --model wonn \
      --ch 1024 \
      --heads 16 \
      --L 4 \
      --T 16 \
      --epochs 50 \
      --lr 5e-4 \
      --optimizer adamw \
      --weight_decay 0.01 \
      --warmup_steps 500 \
      --lr_min 1e-5 \
      --amp true \
      --clip_grad_norm 1.0 \
      --eval_freq 1 \
      --device auto \
      --exp_name wonntext_wikitext_10x
