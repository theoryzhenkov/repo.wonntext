# Train the 10x WONNText model on WikiText-103 using an A40.
# Uses the default SkyPilot image (torch is installed in setup).
# Optimisations: T=8 (diagnostic showed steps 8-15 are oscillatory drift),
# gradient checkpointing (allows batch 64), bf16 AMP, AdamW + cosine LR.

name: wonntext-wikitext-10x

resources:
  cloud: runpod
  accelerators: A100-80GB:1
  disk_size: 100

workdir: .

setup: |
  set -e
  cd "$SKYP_TASK_WORKDIR"

  pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cu124
  pip install --no-cache-dir -r sky/requirements-runtime.txt

  # Prepare WikiText-103 BPE dataset (~100M tokens).
  # Reuse the WikiText-2 tokenizer so the arithmetic fine-tuning vocab matches.
  python scripts/prepare_wikitext.py \
      --out_dir "$HOME/wikitext_data" \
      --vocab_size 10000 \
      --config wikitext-103-raw-v1 \
      --tokenizer_path assets/wikitext/tokenizer.json

run: |
  set -e
  cd "$SKYP_TASK_WORKDIR"
  PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True PYTHONPATH=src python -m wonntext.train \
      --data_dir "$HOME/wikitext_data" \
      --seq_len 256 \
      --batchsize 64 \
      --eval_batchsize 128 \
      --model wonn \
      --ch 1024 \
      --heads 16 \
      --L 4 \
      --T 8 \
      --epochs 10 \
      --lr 5e-4 \
      --optimizer adamw \
      --weight_decay 0.01 \
      --warmup_steps 1000 \
      --lr_min 1e-5 \
      --amp true \
      --grad_checkpoint true \
      --winfree_mode parallel_scan \
      --clip_grad_norm 1.0 \
      --eval_freq 1 \
      --device auto \
      --exp_name wonntext_wikitext_10x
