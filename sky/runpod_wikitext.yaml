# SkyPilot task for training WONNText on WikiText-2 using RunPod.
# Uses the public RunPod PyTorch image so torch/CUDA are pre-installed.

name: wonntext-wikitext

resources:
  cloud: runpod
  # Replace owner/repo with your GitHub repo name once the image is pushed.
  image_id: docker:YOUR_DOCKERHUB_USERNAME/wonntext-runtime:latest
  accelerators: L4:1
  disk_size: 100

workdir: .

setup: |
  set -e
  cd "$SKYP_TASK_WORKDIR"

  # torch is already present in the pre-baked image.
  pip install --no-cache-dir -r sky/requirements-runtime.txt

  # Prepare WikiText-2 BPE dataset.
  python scripts/prepare_wikitext.py \
      --out_dir "$HOME/wikitext_data" \
      --vocab_size 10000

run: |
  set -e
  cd "$SKYP_TASK_WORKDIR"
  PYTHONPATH=src python -m wonntext.train \
      --data_dir "$HOME/wikitext_data" \
      --seq_len 256 \
      --batchsize 32 \
      --eval_batchsize 32 \
      --ch 256 \
      --heads 8 \
      --T 16 \
      --L 1 \
      --epochs 50 \
      --lr 1e-3 \
      --clip_grad_norm 1.0 \
      --eval_freq 1 \
      --device auto \
      --exp_name wonntext_wikitext
